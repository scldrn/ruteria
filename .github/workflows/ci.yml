name: Quality Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_TELEMETRY_DISABLED: 1

on:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruteria
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ruteria/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm test
      - run: cp .env.example .env.local
      - run: npm run build
