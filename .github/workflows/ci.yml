name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_TELEMETRY_DISABLED: 1

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruteria
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ruteria/package-lock.json
      - run: npm ci
      - run: npm run type-check

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruteria
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ruteria/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruteria
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ruteria/package-lock.json
      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruteria
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ruteria/package-lock.json
      - run: npm ci
      - run: cp .env.example .env.local
      - run: npm run build

  e2e:
    if: github.event_name == 'push' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruteria
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ruteria/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1.6.0
        with:
          version: latest

      - name: Start Supabase local stack
        run: supabase start

      - name: Export local Supabase env
        run: ./scripts/export-supabase-env.sh github

      - name: Reset database and seed auth fixtures
        run: |
          npm run db:reset
          npm run seed:auth

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run e2e
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            ruteria/playwright-report
            ruteria/test-results
          if-no-files-found: ignore

  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruteria
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ruteria/package-lock.json
      - run: npm ci
      - run: npm run audit:prod
