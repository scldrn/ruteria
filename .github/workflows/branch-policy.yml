name: Branch Policy

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

jobs:
  enforce-source-branch:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check source branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD_REF" == release/* ]] || [[ "$HEAD_REF" == hotfix/* ]]; then
            echo "✅ Source branch '$HEAD_REF' is allowed to target main."
            exit 0
          fi

          gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "$(cat <<EOF
          ## ⛔ Branch policy violation

          This PR targets \`main\` directly from \`$HEAD_REF\`.

          Only \`release/*\` and \`hotfix/*\` branches may merge into \`main\`.

          **What to do:**
          - If this is a feature: target \`develop\` instead.
          - If this is a release: rename your branch to \`release/sprint-N\`.
          - If this is a hotfix: rename your branch to \`hotfix/description\`.

          This PR will be closed automatically.
          EOF
          )"

          gh pr close "$PR_NUMBER" --repo "${{ github.repository }}"
